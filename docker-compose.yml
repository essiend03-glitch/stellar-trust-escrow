services:
  # ── Stellar Quickstart (local Soroban sandbox) ──────────────────────────────
  stellar:
    image: stellar/quickstart:latest
    command: --local --enable-soroban-rpc
    ports:
      - '8000:8000' # Horizon API
      - '8001:8001' # Soroban RPC
    environment:
      NETWORK_PASSPHRASE: 'Standalone Network ; February 2017'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - stellar_data:/opt/stellar

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stellar_escrow
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      target: backend
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/stellar_escrow
      ELASTICSEARCH_URL: http://elasticsearch:9200
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - elasticsearch

  frontend:
    build:
      context: .
      target: frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

  soroban-sandbox:
    image: stellar/quickstart:soroban-dev
    container_name: stellar-sandbox
    command: ['--enable-soroban-rpc', '--standalone']
    ports:
      - '8000:8000'
    environment:
      ENABLE_SOROBAN_RPC: 'true'
      NETWORK: 'standalone'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8000/soroban/rpc || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  esdata:
  stellar_data:
