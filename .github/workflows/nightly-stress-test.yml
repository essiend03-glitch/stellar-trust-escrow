name: Nightly Stress Tests

on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC daily
  workflow_dispatch:
    inputs:
      duration:
        description: 'Test duration in seconds'
        required: false
        default: '300'
      connections:
        description: 'Concurrent connections'
        required: false
        default: '200'
      target_url:
        description: 'Target URL (leave empty for local server)'
        required: false
        default: ''

concurrency:
  group: nightly-stress-test
  cancel-in-progress: true

jobs:
  nightly-load-test:
    name: Nightly Load Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stellar_escrow_loadtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Run migrations and seed
        run: |
          npm run db:migrate -w backend
          npm run db:seed -w backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/stellar_escrow_loadtest
          NODE_ENV: test
      - name: Generate load test data
        run: npm run loadtest:generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/stellar_escrow_loadtest
      - name: Run nightly load tests
        run: npm run loadtest:nightly
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/stellar_escrow_loadtest
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: nightly-test-secret
          ENCRYPTION_KEY: nightly-encryption-key-32-chars!!
          CI: 'true'
      - name: Upload nightly load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-load-test-${{ github.run_number }}
          path: load-tests/results/
          retention-days: 90

  stress-test:
    name: Stress Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stellar_escrow_stress
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Run migrations and seed
        run: |
          npm run db:migrate -w backend
          npm run db:seed -w backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/stellar_escrow_stress
          NODE_ENV: test
      - name: Generate stress test data
        run: npm run loadtest:generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/stellar_escrow_stress
      - name: Run stress tests
        run: npm run loadtest:stress
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/stellar_escrow_stress
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: stress-test-secret
          ENCRYPTION_KEY: stress-encryption-key-32-chars!!!
          STRESS_TARGET_URL: ${{ github.event.inputs.target_url || '' }}
          STRESS_DURATION: ${{ github.event.inputs.duration || '300' }}
          STRESS_CONNECTIONS: ${{ github.event.inputs.connections || '200' }}
          CI: 'true'
      - name: Check for critical alerts
        if: always()
        run: |
          if [ -f load-tests/results/stress/latest.json ]; then
            CRITICAL=$(node -e "
              const r = JSON.parse(require('fs').readFileSync('load-tests/results/stress/latest.json'));
              const critical = (r.alerts || []).filter(a => a.severity === 'critical' || a.severity === 'high');
              console.log(critical.length);
            ")
            if [ "$CRITICAL" -gt "0" ]; then
              echo "::error::$CRITICAL critical/high severity alerts detected in stress test"
              exit 1
            fi
          fi
      - name: Upload stress test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-${{ github.run_number }}
          path: load-tests/results/stress/
          retention-days: 90

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [nightly-load-test, stress-test]
    if: failure() && secrets.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":rotating_light: *Nightly stress tests FAILED* on `${{ github.ref_name }}`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  notify-on-success:
    name: Notify on Success
    runs-on: ubuntu-latest
    needs: [nightly-load-test, stress-test]
    if: success() && secrets.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Notify Slack on success
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":white_check_mark: *Nightly stress tests passed* on `${{ github.ref_name }}`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
