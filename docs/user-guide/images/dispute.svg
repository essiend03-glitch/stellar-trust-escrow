<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" rx="24" fill="#0f172a" />
  <rect x="40" y="40" width="720" height="80" rx="18" fill="#1f2937" />
  <text x="60" y="78" fill="#e2e8f0" font-family="Inter, sans-serif" font-size="28" font-weight="700">Dispute Process</text>
  <rect x="80" y="150" width="240" height="210" rx="18" fill="#111827" stroke="#475569" stroke-width="2" />
  <text x="120" y="200" fill="#f8fafc" font-family="Inter, sans-serif" font-size="20">Buyer or Seller</text>
  <text x="120" y="230" fill="#94a3b8" font-family="Inter, sans-serif" font-size="16">creates a dispute</text>
  <rect x="280" y="180" width="240" height="210" rx="18" fill="#111827" stroke="#475569" stroke-width="2" />
  <text x="320" y="220" fill="#f8fafc" font-family="Inter, sans-serif" font-size="20">Escrow holds funds</text>
  <text x="320" y="250" fill="#94a3b8" font-family="Inter, sans-serif" font-size="16">No money moves while under review.</text>
  <rect x="480" y="210" width="240" height="150" rx="18" fill="#111827" stroke="#475569" stroke-width="2" />
  <text x="520" y="250" fill="#f8fafc" font-family="Inter, sans-serif" font-size="20">Arbitrator decides</text>
  <text x="520" y="280" fill="#94a3b8" font-family="Inter, sans-serif" font-size="16">Funds are released or returned.</text>
  <line x1="320" y1="260" x2="280" y2="260" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
  <line x1="520" y1="300" x2="560" y2="300" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
</svg>
